version: '3.8'

services:
  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: netdiscover_server
    # Run container using host network mode so ARP scans can broadcast on local interfaces.
    # Note: On Windows/Mac, network_mode: host behaves differently. Fallback to port mapping if needed.
    network_mode: host
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      - PORT=5000
    volumes:
      - ./server/reports:/app/reports
      - ./server/netdiscover.db:/app/netdiscover.db

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Next.js embeds NEXT_PUBLIC variables during the BUILD phase.
        # Docker Compose will read these from your host machine's .env file and pass them securely into the build.
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5000/api}
    container_name: netdiscover_client
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server
