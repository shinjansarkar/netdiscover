<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetDiscover - Vigilant Monitoring</title>
    <!-- Google Fonts: Outfit & Space Grotesk for high-end feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    
    <!-- Base Stylesheet -->
    <style>
        :root {
            /* Theme Color Palette - Sleek Dark Mode */
            --bg-deep: #0b0c10;
            --bg-dark: #12131a;
            --bg-card: #1a1c24;
            --bg-input: #222530;
            --border-color: #2a2e3d;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            
            --accent-blue: #3b82f6;
            --accent-purple: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.45);
            --accent-cyan: #06b6d4;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e;
            
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --border-radius-lg: 16px;
            --border-radius-md: 12px;
            --border-radius-sm: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-deep);
            background-image: linear-gradient(rgba(11, 12, 16, 0.93), rgba(11, 12, 16, 0.93)), url("{{ url_for('static', filename='images/network_bg.png') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-primary);
            overflow-x: hidden;
            display: flex;
            min-height: 100vh;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-deep);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Sidebar Container */
        .sidebar {
            width: 260px;
            background-color: var(--bg-dark);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding-left: 8px;
        }

        .sidebar-brand-icon {
            font-size: 24px;
            color: var(--accent-blue);
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .sidebar-brand-name {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-primary);
        }

        .sidebar-brand-subtitle {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-top: -4px;
        }

        .sidebar-nav {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-grow: 1;
        }

        .sidebar-nav-item a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-radius: var(--border-radius-sm);
            transition: var(--transition-smooth);
        }

        .sidebar-nav-item a:hover {
            color: var(--text-primary);
            background-color: var(--bg-card);
        }

        .sidebar-nav-item.active a {
            color: var(--text-primary);
            background-color: var(--accent-blue);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }

        .sidebar-footer {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-global-scan {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: var(--accent-blue);
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 600;
            padding: 12px;
            border: none;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            transition: var(--transition-smooth);
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-global-scan:hover {
            background-color: #2563eb;
            box-shadow: 0 4px 18px rgba(59, 130, 246, 0.5);
        }

        /* Main Workspace Container */
        .workspace {
            margin-left: 260px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Header Navigation */
        .header {
            height: 70px;
            background-color: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .search-container {
            position: relative;
            width: 320px;
        }

        .search-input {
            width: 100%;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            padding: 10px 16px 10px 40px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: var(--transition-smooth);
        }

        .search-input:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            position: relative;
            transition: var(--transition-smooth);
        }

        .header-btn:hover {
            color: var(--text-primary);
        }

        .header-btn-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background-color: var(--accent-rose);
            border-radius: 50%;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 20px;
            border-left: 1px solid var(--border-color);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--accent-purple);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-primary);
        }

        /* Content Container */
        .content {
            padding: 32px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Custom Status Indicator in Footer */
        .status-footer {
            height: 40px;
            background-color: var(--bg-dark);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-emerald);
            box-shadow: 0 0 8px var(--accent-emerald);
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        .footer-links a:hover {
            color: var(--text-secondary);
        }

        /* Utility Components: Cards */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        
        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--accent-emerald);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .badge-warning {
            background-color: rgba(245, 158, 11, 0.1);
            color: var(--accent-amber);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .badge-danger {
            background-color: rgba(244, 63, 94, 0.1);
            color: var(--accent-rose);
            border: 1px solid rgba(244, 63, 94, 0.2);
        }

        .badge-info {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        /* Grid System */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .grid-5 {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
        }

        @media (max-width: 1200px) {
            .grid-3 {
                grid-template-columns: 1fr;
            }
            .grid-5 {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-compass-drafting sidebar-brand-icon"></i>
            <div>
                <div class="sidebar-brand-name">NetDiscover</div>
                <div class="sidebar-brand-subtitle">Vigilant Monitoring</div>
            </div>
        </div>

        <ul class="sidebar-nav">
            <li class="sidebar-nav-item {% if active_tab == 'dashboard' %}active{% endif %}">
                <a href="{{ url_for('dashboard') }}">
                    <i class="fa-solid fa-chart-pie"></i>
                    Dashboard
                </a>
            </li>
            <li class="sidebar-nav-item {% if active_tab == 'new_scan' %}active{% endif %}">
                <a href="{{ url_for('new_scan_page') }}">
                    <i class="fa-solid fa-satellite-dish"></i>
                    New Scan
                </a>
            </li>
            <li class="sidebar-nav-item {% if active_tab == 'scan_history' %}active{% endif %}">
                <a href="{{ url_for('scan_history_page') }}">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    Scan History
                </a>
            </li>
            <li class="sidebar-nav-item {% if active_tab == 'reports' %}active{% endif %}">
                <a href="{{ url_for('reports_page') }}">
                    <i class="fa-solid fa-file-contract"></i>
                    Reports
                </a>
            </li>
            <li class="sidebar-nav-item {% if active_tab == 'logs' %}active{% endif %}">
                <a href="{{ url_for('logs_page') }}">
                    <i class="fa-solid fa-terminal"></i>
                    Logs
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <a href="{{ url_for('new_scan_page') }}" class="btn-global-scan">
                <i class="fa-solid fa-globe"></i>
                Start Global Scan
            </a>
        </div>
    </div>

    <!-- Main Workspace -->
    <div class="workspace">
        <div class="header">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" class="search-input" placeholder="Search network segment...">
            </div>
            
            <div class="header-actions">
                <button class="header-btn">
                    <i class="fa-regular fa-bell"></i>
                    <span class="header-btn-badge"></span>
                </button>
                <button class="header-btn">
                    <i class="fa-solid fa-circle-nodes"></i>
                </button>
                <div class="user-profile">
                    <div class="user-avatar">AD</div>
                </div>
            </div>
        </div>

        <div class="content">
            {% block content %}{% endblock %}
        </div>

        <!-- System Status Footer -->
        <div class="status-footer">
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span>Engine Status: <strong>Active</strong></span>
                <span style="margin: 0 8px; color: var(--border-color);">|</span>
                <span>Latency: <strong>14ms</strong></span>
            </div>
            <div class="footer-links">
                <a href="#">Support</a>
                <a href="#">Privacy</a>
                <a href="#">API Documentation</a>
            </div>
        </div>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
